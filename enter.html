<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS · AI 职业规划助手</title>
<style>
  :root{
    --bg:#07090d; --bg-2:#0b0e14; --surface:#0e121a;
    --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.14);
    --text:#e8edf5; --text-2:#9aa6b8; --text-3:#5f6b7e;
    --accent:#3ad6c8; --accent-2:#36b9f0;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;
    display:flex;align-items:center;justify-content:center;padding:1.4rem;
    background-image:radial-gradient(900px 500px at 80% -10%,rgba(54,185,240,.08),transparent),
                     linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);
    background-size:auto,42px 42px,42px 42px;}
  .box{width:100%;max-width:460px;text-align:center}
  .brand{display:inline-flex;align-items:center;gap:.6rem;font-size:1.5rem;font-weight:800;letter-spacing:.05em;margin-bottom:.4rem}
  .brand .mk{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:#04110f;
    background:linear-gradient(120deg,var(--accent),var(--accent-2));font-weight:800;font-size:1.05rem}
  .brand b{color:var(--accent)}
  .tag{color:var(--text-2);font-size:.92rem;margin-bottom:.35rem}
  .hint{color:var(--text-3);font-size:.82rem;margin-bottom:1.8rem}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem}
  @media(max-width:420px){.grid{grid-template-columns:repeat(2,1fr)}}
  .ch{background:linear-gradient(180deg,var(--surface),var(--bg-2));border:1px solid var(--line);border-radius:14px;
    padding:1.1rem .6rem;cursor:pointer;transition:.18s;display:flex;flex-direction:column;align-items:center;gap:.5rem;
    color:var(--text);text-decoration:none}
  .ch:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(58,214,200,.12)}
  .ch .ic{width:34px;height:34px}
  .ch .nm{font-size:.9rem;font-weight:600}
  .skip{margin-top:1.6rem}
  .skip a{color:var(--text-3);font-size:.82rem;text-decoration:none;border-bottom:1px dashed var(--line-2);padding-bottom:1px}
  .skip a:hover{color:var(--accent)}
  .foot{margin-top:2rem;color:var(--text-3);font-size:.74rem}
</style>
</head>
<body>
  <div class="box">
    <div class="brand"><span class="mk">A</span><span>ATL<b>A</b>S</span></div>
    <div class="tag">AI 职业规划助手</div>
    <div class="hint">开始之前，方便告诉我你是从哪里来的吗？（点一下即可，帮助我做得更好）</div>

    <div class="grid" id="grid"></div>

    <div class="skip"><a href="#" data-ch="直接进入">跳过，直接进入 →</a></div>
    <div class="foot">测评 · 路径规划 · AI 深度咨询</div>
  </div>

<script>
  var CHANNELS = [
    { key:'微信',    color:'#2dc100', path:'M8.5 3C4.9 3 2 5.4 2 8.4c0 1.7 1 3.2 2.5 4.2L4 15l2.6-1.4c.6.2 1.2.3 1.9.3h.5c-.1-.4-.2-.9-.2-1.3 0-2.8 2.7-5 6.1-5h.6C15 4.4 12 3 8.5 3zm-2.4 3.9c.4 0 .7.3.7.7s-.3.7-.7.7-.7-.3-.7-.7.3-.7.7-.7zm4.8 0c.4 0 .7.3.7.7s-.3.7-.7.7-.7-.3-.7-.7.3-.7.7-.7z M22 12.6c0-2.5-2.5-4.6-5.6-4.6s-5.6 2.1-5.6 4.6 2.5 4.6 5.6 4.6c.6 0 1.2-.1 1.8-.3l1.9 1-.5-1.7c1.4-.9 2.4-2.1 2.4-3.6zm-7.4-1c-.3 0-.6-.3-.6-.6s.3-.6.6-.6.6.3.6.6-.3.6-.6.6zm3.6 0c-.3 0-.6-.3-.6-.6s.3-.6.6-.6.6.3.6.6-.3.6-.6.6z' },
    { key:'朋友圈',  color:'#3ad6c8', path:'M12 2a10 10 0 100 20 10 10 0 000-20zm0 3a2 2 0 110 4 2 2 0 010-4zm0 14a5 5 0 01-4.5-2.8c0-1.5 3-2.3 4.5-2.3s4.5.8 4.5 2.3A5 5 0 0112 19z' },
    { key:'QQ',      color:'#12b7f5', path:'M12 2c3 0 5 2.4 5 5.4 0 1 .5 1.8 1 2.6.6.9 1.2 1.8 1.2 3.2 0 1-.4 1.8-.9 1.8-.4 0-.7-.4-1-1-.3.9-.9 1.7-1.6 2.3.6.2 1 .5 1 .9 0 .6-1.8 1.8-4.7 1.8s-4.7-1.2-4.7-1.8c0-.4.4-.7 1-.9-.7-.6-1.3-1.4-1.6-2.3-.3.6-.6 1-1 1-.5 0-.9-.8-.9-1.8 0-1.4.6-2.3 1.2-3.2.5-.8 1-1.6 1-2.6C7 4.4 9 2 12 2z' },
    { key:'小红书',  color:'#ff2442', path:'M4 4h16v16H4V4zm3 4v8h2v-8H7zm4 0v8h2l2-8h-2l-1 4-1-4h-1z' },
    { key:'抖音',    color:'#fe2c55', path:'M16 2c.3 1.8 1.4 3.3 3 3.9V9c-1.1 0-2.2-.4-3-1v5.5A5.5 5.5 0 118.5 8v3a2.5 2.5 0 102.5 2.5V2h5z' },
    { key:'知乎',    color:'#0084ff', path:'M6 4h6v2H9.5c0 1-.1 2-.3 3H12l-.3 2H8.7c-.4 1.3-1 2.5-1.9 3.6L6 16l1.4-4H5V10h2.7c.2-1 .3-2 .3-3H6.5L6 4zm8 0h4v14h-2l-2 2v-2h-1V6h1V4z' },
    { key:'B站',     color:'#fb7299', path:'M6 3l2 2h8l2-2 1 1-1.5 1.5H21v12a2 2 0 01-2 2H5a2 2 0 01-2-2V6h2.5L4 4.5 5 3zm2 7v3h1v-3H8zm7 0v3h1v-3h-1z' },
    { key:'朋友推荐',color:'#f0b429', path:'M12 2l2.9 6 6.6.5-5 4.3 1.6 6.4L12 16l-6.1 3.7L7.5 13l-5-4.3L9.1 8 12 2z' },
    { key:'搜索来的',color:'#9aa6b8', path:'M10 2a8 8 0 105.3 14l4.4 4.4 1.4-1.4-4.4-4.4A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z' }
  ];

  var grid = document.getElementById('grid');
  CHANNELS.forEach(function(c){
    var a = document.createElement('a');
    a.className = 'ch';
    a.href = '#';
    a.setAttribute('data-ch', c.key);
    a.innerHTML = '<svg class="ic" viewBox="0 0 24 24" fill="'+c.color+'"><path d="'+c.path+'"/></svg>'
                + '<span class="nm">'+c.key+'</span>';
    grid.appendChild(a);
  });

  document.addEventListener('click', function(e){
    var el = e.target.closest('[data-ch]');
    if(!el) return;
    e.preventDefault();
    var ch = el.getAttribute('data-ch');
    var url = 'index.html?from=' + encodeURIComponent(ch);
    location.href = url;
  });
</script>
</body>
</html>
